# This is a fixture/template, not real data -- copy it to device-playlist.toml
# (gitignored) and edit that instead. Never commit your real playlist here.
#
# Use-editable. Keys are always Semantic (names you chose), values are always
# Gutenberg (whatever the transport resolves to) -- never the reverse.
# See README.md #2 "The device-playlist file format" for the full rule.
#
# Never put a credential or key directly in this file, even in your private
# copy. Reference the name of an environment variable instead (see the
# mqtt-broker example below) and put the real value in a gitignored .env
# file, loaded with `node --env-file=.env`. See README.md #2 "Secrets never
# go in the playlist" for the full rule.

myHpPrinter.transport = "mdns"
myHpPrinter.address   = "printer.local"

mqtt-broker.transport     = "mdns"
mqtt-broker.address       = "_mqtt._tcp.local"
mqtt-broker.password_env  = "MQTT_BROKER_PASSWORD"

# Router-assigned via DHCP+DNS (dnsmasq-style), not mDNS -- regular
# unicast DNS to whatever server this machine already uses, normally the
# router itself. See README.md "Extending to router-assigned local DNS
# names".
raspi3.transport = "dns"
raspi3.address   = "raspi3.home"

# Dirigera hub connection config (hostname, bearer token) lives in .env --
# DIRIGERA_HOSTNAME, DIRIGERA_BEARER_TOKEN -- not here. See README.md
# "Extending to vendor-hub REST APIs".
kitchen-lamp.transport = "dirigera"
kitchen-lamp.address   = "<dirigera-device-id>"

# Optional, per device: narrow display-fields/dirigera.toml's `light`
# catalog down to just the lines this device cares about -- an allow-list
# (only these labels show) or a deny-list (everything except these), never
# both on the same device (the allow-list wins if both are set). Neither
# key: every catalog line shows, the default. See README.md "Flattening
# nested readings for display".
# hallway-lamp.transport           = "dirigera"
# hallway-lamp.address             = "<dirigera-device-id>"
# hallway-lamp.displayFields       = ["On"]
# another-lamp.transport           = "dirigera"
# another-lamp.address             = "<dirigera-device-id>"
# another-lamp.excludeDisplayFields = ["Brightness"]

# Ecowitt is a cloud API (ECOWITT_APPLICATION_KEY, ECOWITT_API_KEY in
# .env), not a local hub like Dirigera -- see README.md "Extending to
# cloud vendor APIs" for why that's a real, honestly-stated difference.
weather-station.transport = "ecowitt"
weather-station.address   = "<device-mac>"

# Smartbridge/ICS2000 (KlikAanKlikUit's cloud, SMARTBRIDGE_EMAIL /
# SMARTBRIDGE_MAC / SMARTBRIDGE_PASSWORD_HASH in .env) -- meta carries
# version_status/version_data as real change-detection signals; the
# device's actual state (data/status) is encrypted ciphertext with no
# known decryption, passed through opaque rather than guessed at.
kaku-plug.transport = "smartbridge"
kaku-plug.address   = "<ics2000-device-id>"

# Raw WebUSB -- address is "vvvv:pppp" (hex vendorId:productId, the same
# pair lsusb/Device Manager show). No standard interface to resolve a name
# against the way BLE GATT has, so interfaceNumber/endpointNumber are named
# explicitly. See README.md "Extending to WebUSB and WebHID".
usb-widget.transport      = "usb"
usb-widget.address        = "1a86:7523"
usb-widget.interfaceNumber = 0
usb-widget.endpointNumber  = 1

# WebHID -- same "vvvv:pppp" address shape as usb-widget above, but reached
# via navigator.hid instead of navigator.usb. This is also how a *Bluetooth*
# HID device is reached from a browser at all, since Web Bluetooth excludes
# the HID-over-GATT service on purpose -- see README.md "Extending to
# WebUSB and WebHID".
game-controller.transport = "hid"
game-controller.address   = "0079:0011"

# Nested devices+readings, flattened at load time into
# kitchen-thermometer-temperature / kitchen-thermometer-battery -- see
# README.md "Extending to BLE GATT characteristics". Any bare `key = value`
# line has to come before this [devices.*] section, not after -- TOML has
# no way to "return to root" once a [table] header appears; the next bare
# assignment would nest under the last header instead, silently.
[devices.kitchen-thermometer]
transport = "bluetooth"
address   = "AA:BB:CC:DD:EE:FF"

[devices.kitchen-thermometer.readings]
temperature = { service = "health-thermometer", characteristic = "temperature-measurement" }
battery     = { service = "battery-service",     characteristic = "battery-level" }
