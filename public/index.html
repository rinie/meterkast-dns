<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>meterkast-dns</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  nav a { display: inline-block; font-size: 1rem; padding: 0.5rem 1rem; margin: 0 0.5rem 0.5rem 0; border: 1px solid #ccc; border-radius: 4px; text-decoration: none; color: inherit; }
  table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
  th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; font-size: 0.9rem; }
  tr.bluetooth { background: #f0f7ff; }
  .empty { color: #888; font-style: italic; }
</style>
</head>
<body>
<h1>meterkast-dns</h1>
<p>A local, external, Use-Pull resolver for smart-home device identity.</p>
<nav>
  <a href="/web-scan">Scan BLE/USB devices &rarr;</a>
  <a href="/screens">Screens (markdown, DataTables) &rarr;</a>
</nav>

<h2>Devices</h2>
<p>Bluetooth entries are highlighted. Updates live via <code>/events</code> --
no need to reload.</p>
<table id="devices-table">
  <thead><tr><th>Name</th><th>Transport</th><th>Address</th><th>Details</th></tr></thead>
  <tbody><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
</table>

<script type="module">
function detailsFor(device) {
  const parts = [];
  if (device.service) parts.push(`${device.service} / ${device.characteristic}`);
  if (device.meta) parts.push(JSON.stringify(device.meta));
  return parts.join(" -- ");
}

function renderRow(device) {
  const tr = document.createElement("tr");
  if (device.transport === "bluetooth") tr.className = "bluetooth";
  const cells = [device.name, device.transport, device.address, detailsFor(device)];
  for (const value of cells) {
    const td = document.createElement("td");
    td.textContent = value;
    tr.append(td);
  }
  return tr;
}

async function loadDevices() {
  const res = await fetch("/devices");
  const devices = await res.json();
  const tbody = document.querySelector("#devices-table tbody");
  tbody.innerHTML = "";
  if (devices.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">No devices in the playlist yet.</td></tr>';
    return;
  }
  for (const device of devices.sort((a, b) => a.name.localeCompare(b.name))) {
    tbody.append(renderRow(device));
  }
}

loadDevices();

// Reuses the same SSE stream the design already relies on everywhere else
// -- no polling. The core's handle-subscribe.js sends a named "change"
// event, not the default "message" event.
new EventSource("/events").addEventListener("change", () => loadDevices());
</script>
</body>
</html>
