# Curated flat display fields per transport -- a few lines mirroring a
# device's own physical console (Ecowitt's indoor unit shows Indoor/
# Outdoor Temperature/Humidity as its main screen), not every field the
# API happens to return. Committed, not gitignored: unlike
# device-playlist.toml (real network topology), this only names paths
# into a transport's own known response shape -- nothing personal, and a
# sensible default for anyone with the same integration. See README.md
# "Flattening nested readings for display".
#
# valuePath/unitPath are dot-paths into a device's own `meta` object.
# unitPath is optional -- omit it for a field whose value needs no unit
# suffix.
[[displayFields.ecowitt]]
label     = "Indoor Temperature"
valuePath = "indoor.temperature.value"
unitPath  = "indoor.temperature.unit"

[[displayFields.ecowitt]]
label     = "Indoor Humidity"
valuePath = "indoor.humidity.value"
unitPath  = "indoor.humidity.unit"

[[displayFields.ecowitt]]
label     = "Outdoor Temperature"
valuePath = "outdoor.temperature.value"
unitPath  = "outdoor.temperature.unit"

[[displayFields.ecowitt]]
label     = "Outdoor Humidity"
valuePath = "outdoor.humidity.value"
unitPath  = "outdoor.humidity.unit"

# Dirigera fans one hub out to structurally different device types --
# a light's isOn/lightLevel means nothing for a door sensor's isOpen --
# so displayFields.dirigera is a table keyed by deviceType instead of a
# flat array. deviceType is the API's own structural classification
# (matchConfiguredDevices in dirigera-adapter.js surfaces it verbatim as
# device.deviceType), not a device name -- keyed by device *model*, the
# same way LIRC's remote-mapping .conf files are keyed by remote model
# rather than by which specific physical remote a user owns, so this
# stays a generic, shareable mapping like the ecowitt entries above, not
# something tied to any one person's specific kitchen light.
#
# Every field below is verified against a real Dirigera hub's real
# attributes (see IMPLEMENTATION.md), not guessed from API docs. Dirigera
# has other deviceTypes too (gateway, repeater, lightController,
# lightSensor, ...); add entries for those the same way once their real
# attributes are confirmed -- these six cover the common actuator/sensor
# cases first.
[[displayFields.dirigera.light]]
label     = "On"
valuePath = "isOn"
format    = "boolean"

[[displayFields.dirigera.light]]
label     = "Brightness"
valuePath = "lightLevel"
unit      = "%"

[[displayFields.dirigera.outlet]]
label     = "On"
valuePath = "isOn"
format    = "boolean"

[[displayFields.dirigera.motionSensor]]
label     = "Detected"
valuePath = "isDetected"
format    = "boolean"

[[displayFields.dirigera.motionSensor]]
label     = "Battery"
valuePath = "batteryPercentage"
unit      = "%"

[[displayFields.dirigera.openCloseSensor]]
label     = "Open"
valuePath = "isOpen"
format    = "boolean"

[[displayFields.dirigera.openCloseSensor]]
label     = "Battery"
valuePath = "batteryPercentage"
unit      = "%"

[[displayFields.dirigera.waterSensor]]
label     = "Leak Detected"
valuePath = "waterLeakDetected"
format    = "boolean"

[[displayFields.dirigera.waterSensor]]
label     = "Battery"
valuePath = "batteryPercentage"
unit      = "%"

[[displayFields.dirigera.environmentSensor]]
label     = "Temperature"
valuePath = "currentTemperature"
unit      = "°C"

[[displayFields.dirigera.environmentSensor]]
label     = "Humidity"
valuePath = "currentRH"
unit      = "%"

[[displayFields.dirigera.environmentSensor]]
label     = "PM2.5"
valuePath = "currentPM25"
unit      = "µg/m³"

[[displayFields.dirigera.environmentSensor]]
label     = "VOC Index"
valuePath = "vocIndex"
